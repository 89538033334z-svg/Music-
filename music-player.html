<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>*{margin:0;padding:0}body{background:transparent;overflow:hidden}</style>
</head>
<body>
<audio id="bgMusic" loop><source src="https://raw.githubusercontent.com/89538033334z-svg/Music-/main/leberch-ambient-atmospheric-509533.mp3" type="audio/mpeg"></audio>
<script>
(function(){
const a=document.getElementById('bgMusic');
if(!a)return;
a.volume=0.2;
const k='musicUserPreference';
if(localStorage.getItem(k)==='on')a.play().catch(()=>{});
a.onplay=()=>localStorage.setItem(k,'on');
a.onpause=()=>localStorage.setItem(k,'off');
window.addEventListener('message',e=>{
if(e.data==='toggleMusic'){
a.paused?a.play().catch(()=>{}):a.pause();
}else if(e.data==='getMusicState'){
window.parent.postMessage({type:'musicState',isPlaying:!a.paused},'*');
}
});
window.parent.postMessage({type:'musicPlayerReady'},'*');
})();
</script>
</body>
</html>
