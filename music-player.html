<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>*{margin:0;padding:0}body{background:transparent;overflow:hidden}</style>
</head>
<body>
<audio id="bgMusic" loop>
    <source src="https://raw.githubusercontent.com/89538033334z-svg/Music-/main/leberch-ambient-atmospheric-509533.mp3" type="audio/mpeg">
</audio>
<script>
(function() {
    const audio = document.getElementById('bgMusic');
    if(!audio) return;
    audio.volume = 0.2;
    const key = 'musicUserPreference';
    if(localStorage.getItem(key) === 'on') audio.play().catch(()=>{});
    audio.onplay = () => localStorage.setItem(key, 'on');
    audio.onpause = () => localStorage.setItem(key, 'off');
    window.addEventListener('message', e => {
        if(e.data === 'toggleMusic') {
            audio.paused ? audio.play().catch(()=>{}) : audio.pause();
        } else if(e.data === 'getMusicState') {
            window.parent.postMessage({type:'musicState', isPlaying:!audio.paused}, '*');
        }
    });
    window.parent.postMessage({type:'musicPlayerReady'}, '*');
})();
</script>
</body>
</html>
